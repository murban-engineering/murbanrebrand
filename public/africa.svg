<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Africa operations map</title>
  <desc id="desc">Geographic map of Africa with highlighted countries where murban ENGINEERING operates.</desc>

  <rect width="1200" height="900" fill="#F8FAFC"/>

  <!-- Sea -->
  <rect x="150" y="70" width="900" height="760" rx="28" fill="#E2E8F0"/>

  <!-- Africa mainland (more geographically accurate silhouette) -->
