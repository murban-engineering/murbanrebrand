  <path d="M326 481L366 474L407 470L448 471L489 476L530 482L573 488L615 497L657 507L699 520L742 538"
    stroke="#CFFAFE" stroke-width="2" stroke-linecap="round"/>

  <!-- Countries of operation -->
  <g fill="#F59E0B" stroke="#92400E" stroke-width="1.5">
    <circle cx="452" cy="383" r="7"/>
    <circle cx="500" cy="366" r="7"/>
    <circle cx="678" cy="302" r="7"/>
    <circle cx="676" cy="472" r="7"/>
